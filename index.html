<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>互動式音準練習 - 童趣闖關版</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@700;900&display=swap');

        :root {
            --bg-color: #E0F7FA;       
            --text-color: #5D4037;     
            --accent-color: #4DB6AC;   
            --warning-color: #FF8A65;  
            --panel-bg: #FFFFFF;       
            --border-color: #FFF59D;   
            --dot-color: #E0E0E0;      
            --active-dot-color: #FFF176; 
            --cursor-pos: 50%; 
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Nunito', 'Helvetica Neue', Arial, sans-serif;
            font-weight: 700;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            height: 100vh;
            height: 100dvh; 
            overflow: hidden; 
        }

        header {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 15px 25px;
            margin: 15px;
            background-color: var(--panel-bg);
            border-radius: 50px;
            border: 6px solid var(--border-color);
            box-shadow: 0 8px 0 rgba(0,0,0,0.05);
            flex-wrap: wrap; 
            gap: 15px;
            z-index: 10;
        }

        .header-group {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 1.1rem;
            color: #795548;
        }

        select, input[type="number"] {
            padding: 8px 12px;
            font-size: 1.1rem;
            font-weight: 700;
            font-family: inherit;
            border-radius: 20px;
            border: 3px solid #E0E0E0;
            background-color: #FAFAFA;
            color: var(--text-color);
            cursor: pointer;
            text-align: center;
            transition: border-color 0.3s;
        }
        select:focus, input[type="number"]:focus {
            outline: none;
            border-color: var(--warning-color);
        }

        input[type="number"]::-webkit-inner-spin-button { -webkit-appearance: none; }
        input[type="number"] { width: 60px; -moz-appearance: textfield; }
        input[type="range"] { width: 90px; cursor: pointer; accent-color: var(--warning-color); }

        .mic-status-container {
            display: flex;
            align-items: center;
            background-color: #F5F5F5;
            padding: 6px 12px;
            border-radius: 30px;
            border: 3px solid #EEEEEE;
        }

        .btn-start-mic {
            background-color: #FF5252;
            color: white;
            border: none;
            padding: 10px 18px;
            border-radius: 30px;
            font-weight: 900;
            cursor: pointer;
            font-size: 1.1rem;
            font-family: inherit;
            box-shadow: 0 5px 0 #D32F2F;
            transition: all 0.1s;
        }
        .btn-start-mic:active {
            transform: translateY(5px);
            box-shadow: 0 0 0 #D32F2F;
        }

        .mic-active-ui {
            display: none; 
            align-items: center;
            gap: 8px;
            font-size: 1rem;
            color: #757575;
            font-weight: 900;
        }

        .mic-icon-green {
            width: 14px;
            height: 14px;
            background-color: var(--accent-color); 
            border-radius: 50%;
            box-shadow: 0 0 8px var(--accent-color);
        }

        .volume-bar-container {
            width: 60px;
            height: 12px;
            background-color: #E0E0E0;
            border-radius: 6px;
            overflow: hidden;
        }
        .volume-bar-fill {
            height: 100%;
            width: 0%; 
            background-color: var(--accent-color);
            transition: width 0.05s ease-out;
            border-radius: 6px;
        }

        main {
            flex: 1;
            display: flex;
            flex-direction: row; 
            justify-content: center;
            align-items: center;
            position: relative;
            gap: 50px;
            padding: 20px;
        }

        .sequence-container {
            position: relative;
            width: 320px;
            height: 320px;
            background-color: var(--panel-bg);
            border-radius: 40px;
            border: 8px solid var(--border-color);
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
            display: flex;
            justify-content: space-around;
            align-items: flex-end;
            padding: 20px 10px;
            box-sizing: border-box;
        }

        .grid-line {
            position: absolute;
            width: 90%;
            left: 5%;
            height: 3px;
            background-color: #F5F5F5;
            border-radius: 2px;
            z-index: 0;
        }

        .note-dot-wrapper {
            position: relative;
            width: 60px;
            height: 100%;
            z-index: 1;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            align-items: center;
        }

        .note-dot {
            position: absolute;
            width: 70px;
            height: 70px;
            background-color: var(--panel-bg);
            border: 5px solid var(--dot-color);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.8rem;
            font-weight: 900;
            color: #BDBDBD;
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            transform: translateY(50%); 
            cursor: pointer; 
        }

        .note-dot:active { transform: translateY(50%) scale(0.85); }

        .note-dot.active {
            background-color: var(--active-dot-color);
            border-color: #FBC02D;
            color: #5D4037;
            transform: translateY(50%) scale(1.15);
            box-shadow: 0 8px 15px rgba(255, 235, 59, 0.4);
        }

        .note-dot.done {
            background-color: var(--accent-color);
            border-color: #00897B;
            color: #FFF;
            transform: translateY(50%) scale(1);
        }

        .pitch-visualizer {
            position: relative;
            width: 80px;
            height: 320px;
            background-color: var(--panel-bg);
            border-radius: 40px;
            border: 8px solid var(--border-color);
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
            display: flex;
            justify-content: center;
        }

        .target-line {
            position: absolute;
            top: 50%;
            width: 110px; 
            height: 6px;
            background-color: #FFCDD2; 
            transform: translateY(-50%);
            border-radius: 3px;
            z-index: 2;
        }

        .user-pitch-cursor {
            position: absolute;
            bottom: var(--cursor-pos); 
            width: 50px;
            height: 50px;
            background-color: var(--warning-color);
            border-radius: 50%;
            transform: translateY(50%); 
            transition: bottom 0.1s linear, left 0.1s linear, background-color 0.3s;
            box-shadow: 0 5px 15px rgba(255, 138, 101, 0.5);
            opacity: 0.3; 
            z-index: 3;
            border: 4px solid #FFF;
        }
        
        .user-pitch-cursor.active { opacity: 1; }
        .user-pitch-cursor.perfect {
            background-color: var(--accent-color);
            box-shadow: 0 5px 20px rgba(77, 182, 172, 0.6);
            transform: translateY(50%) scale(1.2);
        }

        .success-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(255, 255, 255, 0.9);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.4s;
        }
        .success-overlay.show { opacity: 1; pointer-events: all; }
        .success-overlay h1 {
            font-size: 5rem;
            color: #FF5252;
            text-shadow: 0 5px 0 #D32F2F;
            margin-bottom: 40px;
            transform: scale(0.5);
            transition: transform 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .success-overlay.show h1 { transform: scale(1) rotate(-5deg); }

        footer {
            padding: 15px;
            display: flex;
            justify-content: center;
            gap: 20px;
            z-index: 10;
            margin-bottom: 10px;
        }

        .btn-play, .btn-massive {
            background-color: #29B6F6; 
            color: white;
            padding: 15px 40px;
            font-size: 1.5rem;
            font-weight: 900;
            font-family: inherit;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 8px 0 #0288D1;
            transition: all 0.1s;
        }
        .btn-play:active, .btn-massive:active {
            transform: translateY(8px);
            box-shadow: 0 0 0 #0288D1;
        }
        
        .btn-massive {
            background-color: #66BB6A; 
            box-shadow: 0 8px 0 #388E3C;
            font-size: 2rem;
            padding: 20px 60px;
        }
        .btn-massive:active { box-shadow: 0 0 0 #388E3C; }

        @media (max-width: 820px) {
            main { flex-direction: column; gap: 30px; }
            .sequence-container { width: 90%; height: 250px; }
            .pitch-visualizer { width: 90%; height: 60px; flex-direction: column; align-items: center; }
            .target-line { top: 0; left: 50%; width: 6px; height: 80px; transform: translateX(-50%); }
            .user-pitch-cursor { bottom: 0; left: var(--cursor-pos); transform: translateX(-50%); }
            .user-pitch-cursor.perfect { transform: translateX(-50%) scale(1.2); }
            .success-overlay h1 { font-size: 3.5rem; }
        }
    </style>
</head>
<body>

    <header>
        <div class="header-group">
            <label>範圍：</label>
            <select id="min-note"></select><span>-</span><select id="max-note"></select>
        </div>
        <div class="header-group">
            <label>出題數：</label>
            <select id="note-count">
                <option value="1">1 個音</option>
                <option value="2">2 個音</option>
                <option value="3" selected>3 個音</option>
            </select>
        </div>
        <div class="header-group">
            <label>A4=</label>
            <input type="number" id="a4-input" value="440">
        </div>
        <div class="header-group">
            <label>靈敏度：</label>
            <input type="range" id="sensitivity-slider" min="1" max="15" value="5" step="0.5">
        </div>
        
        <div class="mic-status-container">
            <button id="start-mic-btn" class="btn-start-mic">🎙️ 開啟麥克風</button>
            <div id="mic-active-ui" class="mic-active-ui">
                <span class="mic-icon-green"></span>
                <span>收音中</span>
                <div class="volume-bar-container"><div class="volume-bar-fill" id="volume-level"></div></div>
            </div>
        </div>
    </header>

    <main>
        <div class="sequence-container" id="sequence-display">
            <div class="grid-line" style="bottom: 25%"></div>
            <div class="grid-line" style="bottom: 50%"></div>
            <div class="grid-line" style="bottom: 75%"></div>
        </div>
        <div class="pitch-visualizer">
            <div class="target-line"></div>
            <div class="user-pitch-cursor" id="pitch-cursor"></div>
        </div>
        <div class="success-overlay" id="success-overlay">
            <h1>🎉 太棒了！🎉</h1>
            <button class="btn-massive" id="next-seq-btn">挑戰下一題 ➔</button>
        </div>
    </main>

    <footer>
        <button class="btn-play" id="play-btn">🎵 聽聽看示範音</button>
    </footer>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const playBtn = document.getElementById('play-btn');
            const startMicBtn = document.getElementById('start-mic-btn');
            const micActiveUI = document.getElementById('mic-active-ui');
            const volumeLevel = document.getElementById('volume-level');
            const pitchCursor = document.getElementById('pitch-cursor');
            const sequenceDisplay = document.getElementById('sequence-display');
            const successOverlay = document.getElementById('success-overlay');
            const nextSeqBtn = document.getElementById('next-seq-btn');
            
            const minNoteSelect = document.getElementById('min-note');
            const maxNoteSelect = document.getElementById('max-note');
            const noteCountSelect = document.getElementById('note-count');
            const a4Input = document.getElementById('a4-input');
            const sensitivitySlider = document.getElementById('sensitivity-slider');
            
            let audioContext;
            let analyser;
            let micGainNode; 
            
            let isDetecting = false;
            let isSequenceComplete = false;
            let isTransitioning = false; 
            
            let currentSequence = []; 
            let currentTargetIndex = 0; 
            let targetFreq = 261.63; 
            
            let matchFrames = 0; 
            const REQUIRED_FRAMES = 15; // 稍微調快判定速度，體驗更俐落
            const CENTS_TOLERANCE = 35; // 容錯度微調
            let smoothedPosition = 50; 

            function midiToNoteName(midi) {
                const noteNames = ['C', 'C#', 'D', 'D#', 'E', 'F', 'F#', 'G', 'G#', 'A', 'A#', 'B'];
                const octave = Math.floor(midi / 12) - 1; 
                const noteName = noteNames[midi % 12];
                if (octave === 3) return noteName.toLowerCase(); 
                if (octave === 4) return noteName.toLowerCase() + '1'; 
                if (octave === 5) return noteName.toLowerCase() + '2'; 
                if (octave === 6) return noteName.toLowerCase() + '3'; 
                return `${noteName.toLowerCase()}${octave}`; 
            }

            function populateNoteSelectors() {
                let optionsHtml = '';
                for (let i = 48; i <= 84; i++) {
                    optionsHtml += `<option value="${i}">${midiToNoteName(i)}</option>`;
                }
                minNoteSelect.innerHTML = optionsHtml;
                maxNoteSelect.innerHTML = optionsHtml;
                minNoteSelect.value = "60"; 
                maxNoteSelect.value = "72"; 
            }

            function midiToFreq(midi) {
                const a4Freq = parseFloat(a4Input.value) || 440;
                return a4Freq * Math.pow(2, (midi - 69) / 12);
            }

            function initAudio() {
                if (!audioContext) {
                    const AudioContext = window.AudioContext || window.webkitAudioContext;
                    audioContext = new AudioContext();
                    analyser = audioContext.createAnalyser();
                    analyser.fftSize = 2048;
                }
            }

            function playSingleNote(midi) {
                initAudio();
                if (audioContext.state === 'suspended') audioContext.resume();

                const oscillator = audioContext.createOscillator();
                const gainNode = audioContext.createGain();
                
                oscillator.type = 'sine'; 
                oscillator.frequency.value = midiToFreq(midi); 
                
                const now = audioContext.currentTime;
                const duration = 1.0; 
                
                gainNode.gain.setValueAtTime(0, now);
                gainNode.gain.linearRampToValueAtTime(1, now + 0.05); 
                gainNode.gain.setValueAtTime(1, now + duration - 0.2); 
                gainNode.gain.exponentialRampToValueAtTime(0.001, now + duration); 
                
                oscillator.connect(gainNode);
                gainNode.connect(audioContext.destination);
                oscillator.start(now);
                oscillator.stop(now + duration);
            }

            function generateSequence() {
                successOverlay.classList.remove('show');
                isSequenceComplete = false; 
                isTransitioning = false; 
                
                const minMidi = parseInt(minNoteSelect.value);
                const maxMidi = parseInt(maxNoteSelect.value);
                const min = Math.min(minMidi, maxMidi);
                const max = Math.max(minMidi, maxMidi);
                const count = parseInt(noteCountSelect.value);

                currentSequence = [];
                const dots = sequenceDisplay.querySelectorAll('.note-dot-wrapper');
                dots.forEach(dot => dot.remove());

                for (let i = 0; i < count; i++) {
                    let noteMidi = Math.floor(Math.random() * (max - min + 1)) + min;
                    currentSequence.push(noteMidi);

                    let heightPercent = 50;
                    if (max > min) {
                        heightPercent = ((noteMidi - min) / (max - min)) * 100;
                    }

                    let wrapper = document.createElement('div');
                    wrapper.className = 'note-dot-wrapper';
                    
                    let dot = document.createElement('div');
                    dot.className = 'note-dot';
                    dot.id = `dot-${i}`;
                    dot.style.bottom = `${heightPercent}%`;
                    dot.textContent = midiToNoteName(noteMidi);
                    
                    dot.addEventListener('click', () => { playSingleNote(noteMidi); });
                    
                    wrapper.appendChild(dot);
                    sequenceDisplay.appendChild(wrapper);
                }

                currentTargetIndex = 0;
                setTargetNote(0);
            }

            function setTargetNote(index) {
                targetFreq = midiToFreq(currentSequence[index]);
                matchFrames = 0;
                
                for (let i = 0; i < currentSequence.length; i++) {
                    let dot = document.getElementById(`dot-${i}`);
                    dot.classList.remove('active');
                    if (i < index) {
                        dot.classList.add('done'); 
                    }
                }
                
                if (index < currentSequence.length) {
                    document.getElementById(`dot-${index}`).classList.add('active'); 
                }
            }

            populateNoteSelectors();
            generateSequence();

            minNoteSelect.addEventListener('change', generateSequence);
            maxNoteSelect.addEventListener('change', generateSequence);
            noteCountSelect.addEventListener('change', generateSequence);
            a4Input.addEventListener('change', () => { targetFreq = midiToFreq(currentSequence[currentTargetIndex]); });
            nextSeqBtn.addEventListener('click', generateSequence);
            
            sensitivitySlider.addEventListener('input', (e) => {
                if (micGainNode) micGainNode.gain.value = parseFloat(e.target.value);
            });

            playBtn.addEventListener('click', () => {
                initAudio();
                if (audioContext.state === 'suspended') audioContext.resume();
                
                let startTime = audioContext.currentTime;
                const noteDuration = 1.0; 
                const gapDuration = 0.5;  
                
                currentSequence.forEach((midi, index) => {
                    const oscillator = audioContext.createOscillator();
                    const gainNode = audioContext.createGain();
                    
                    oscillator.type = 'sine'; 
                    oscillator.frequency.value = midiToFreq(midi); 
                    
                    let playTime = startTime + (index * (noteDuration + gapDuration));
                    
                    gainNode.gain.setValueAtTime(0, playTime);
                    gainNode.gain.linearRampToValueAtTime(1, playTime + 0.05); 
                    gainNode.gain.setValueAtTime(1, playTime + noteDuration - 0.2); 
                    gainNode.gain.exponentialRampToValueAtTime(0.001, playTime + noteDuration); 
                    
                    oscillator.connect(gainNode);
                    gainNode.connect(audioContext.destination);
                    oscillator.start(playTime);
                    oscillator.stop(playTime + noteDuration); 
                });
            });

            startMicBtn.addEventListener('click', async () => {
                try {
                    startMicBtn.textContent = '連線中...';
                    initAudio();
                    const stream = await navigator.mediaDevices.getUserMedia({ 
                        audio: { echoCancellation: false, noiseSuppression: false, autoGainControl: false } 
                    }); 
                    
                    startMicBtn.style.display = 'none';
                    micActiveUI.style.display = 'flex';
                    
                    let microphoneStream = audioContext.createMediaStreamSource(stream);
                    micGainNode = audioContext.createGain();
                    micGainNode.gain.value = parseFloat(sensitivitySlider.value); 
                    
                    microphoneStream.connect(micGainNode);
                    micGainNode.connect(analyser);
                    
                    isDetecting = true;
                    updatePitch(); 
                } catch (err) {
                    console.error("麥克風錯誤:", err);
                    alert('無法開啟麥克風。請確認瀏覽器已允許麥克風權限。');
                    startMicBtn.textContent = '🎙️ 開啟麥克風'; 
                }
            });

            const buffer = new Float32Array(2048);

            function updatePitch() {
                requestAnimationFrame(updatePitch);

                if (!isDetecting || isSequenceComplete || isTransitioning) {
                    return;
                }

                analyser.getFloatTimeDomainData(buffer);
                let rms = 0;
                for (let i = 0; i < buffer.length; i++) rms += buffer[i] * buffer[i];
                rms = Math.sqrt(rms / buffer.length);
                
                volumeLevel.style.width = Math.min(100, rms * 100 * 5) + '%';

                if (rms > 0.002) { 
                    pitchCursor.classList.add('active');
                    let currentFreq = autoCorrelate(buffer, audioContext.sampleRate);
                    
                    if (currentFreq !== -1) {
                        let centsDiff = 1200 * Math.log2(currentFreq / targetFreq);
                        
                        // 將游標顯示範圍縮小（視覺上不要跑得太極端）
                        let targetPosition = 50 + (centsDiff / 1.5); 
                        targetPosition = Math.max(5, Math.min(95, targetPosition));

                        smoothedPosition = (smoothedPosition * 0.85) + (targetPosition * 0.15);
                        pitchCursor.style.setProperty('--cursor-pos', `${smoothedPosition}%`);

                        let smoothedCentsDiff = (smoothedPosition - 50) * 1.5;

                        if (Math.abs(smoothedCentsDiff) < CENTS_TOLERANCE) {
                            matchFrames++;
                            if (matchFrames > REQUIRED_FRAMES) {
                                pitchCursor.classList.add('perfect');
                                currentTargetIndex++;
                                
                                if (currentTargetIndex >= currentSequence.length) {
                                    isSequenceComplete = true; 
                                    document.getElementById(`dot-${currentTargetIndex-1}`).classList.add('done');
                                    document.getElementById(`dot-${currentTargetIndex-1}`).classList.remove('active');
                                    successOverlay.classList.add('show');
                                } else {
                                    isTransitioning = true; 
                                    setTimeout(() => {
                                        setTargetNote(currentTargetIndex);
                                        pitchCursor.classList.remove('perfect');
                                        isTransitioning = false; 
                                    }, 500);
                                }
                            }
                        } else {
                            pitchCursor.classList.remove('perfect');
                            matchFrames = 0;
                        }
                    }
                } else {
                    pitchCursor.classList.remove('active');
                    pitchCursor.classList.remove('perfect');
                    matchFrames = 0;
                    smoothedPosition = (smoothedPosition * 0.9) + (50 * 0.1);
                    pitchCursor.style.setProperty('--cursor-pos', `${smoothedPosition}%`);
                }
            }

            // --- 核心更新：加入拋物線插值 (Parabolic Interpolation) ---
            function autoCorrelate(buf, sampleRate) {
                let SIZE = buf.length;
                let r1 = 0, r2 = SIZE - 1, thres = 0.2;
                for (let i = 0; i < SIZE / 2; i++) if (Math.abs(buf[i]) < thres) { r1 = i; break; }
                for (let i = 1; i < SIZE / 2; i++) if (Math.abs(buf[SIZE - i]) < thres) { r2 = SIZE - i; break; }

                buf = buf.slice(r1, r2);
                SIZE = buf.length;
                let c = new Array(SIZE).fill(0);
                for (let i = 0; i < SIZE; i++) for (let j = 0; j < SIZE - i; j++) c[i] = c[i] + buf[j] * buf[j + i];
                
                let d = 0; while (c[d] > c[d + 1]) d++;
                let maxval = -1, maxpos = -1;
                for (let i = d; i < SIZE; i++) if (c[i] > maxval) { maxval = c[i]; maxpos = i; }
                
                let T0 = maxpos;

                // 拋物線插值，計算小數點後的精確波長，解決高音計算偏低的問題
                if (maxpos > 0 && maxpos < SIZE - 1) {
                    let y1 = c[maxpos - 1], y2 = c[maxpos], y3 = c[maxpos + 1];
                    let a = (y1 + y3 - 2 * y2) / 2;
                    let b = (y3 - y1) / 2;
                    if (a !== 0) T0 = T0 - b / (2 * a);
                }

                return sampleRate / T0;
            }
        });
    </script>
</body>
</html>
