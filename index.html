<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🚀 太空救援小隊 - 音準大冒險</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@700;900&display=swap');

        :root {
            --text-color: #ECEFF1;     
            --accent-color: #4DB6AC;   
            --warning-color: #FFCA28;  
            --panel-bg: rgba(10, 20, 35, 0.75); 
            --border-color: rgba(77, 182, 172, 0.5); 
            --dot-color: #B0BEC5;      
            --active-dot-color: #FFF176; 
            --cursor-pos: 50%; 
            --charge: 0%; 
        }

        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
        }

        body {
            font-family: 'Nunito', 'Helvetica Neue', Arial, sans-serif;
            font-weight: 700;
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            overflow: hidden; 
            background-color: #0F2027;
            background-image: linear-gradient(rgba(10, 20, 35, 0.5), rgba(10, 20, 35, 0.8)), url('https://images.unsplash.com/photo-1462331940025-496dfbfc7564?ixlib=rb-4.0.3&auto=format&fit=crop&w=1920&q=80');
            background-size: cover;
            background-position: center;
        }

        header {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 15px 25px;
            margin: 15px;
            background-color: var(--panel-bg);
            border-radius: 50px;
            border: 2px solid var(--border-color); 
            box-shadow: 0 8px 20px rgba(0,0,0,0.6), inset 0 0 10px rgba(77, 182, 172, 0.2);
            flex-wrap: wrap; 
            gap: 15px;
            z-index: 100; 
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
        }

        .header-group { display: flex; align-items: center; gap: 8px; font-size: 1.1rem; color: #FFF; }
        
        select, input[type="number"] { 
            padding: 8px 12px; 
            font-size: 1.1rem; 
            font-weight: 700; 
            font-family: inherit; 
            border-radius: 20px; 
            border: 2px solid rgba(255, 255, 255, 0.3); 
            background-color: rgba(255, 255, 255, 0.1); 
            color: #FFF; 
            cursor: pointer; 
            text-align: center; 
            transition: border-color 0.3s; 
        }
        select:focus, input[type="number"]:focus { outline: none; border-color: var(--warning-color); }
        select option { color: #000; } 
        
        input[type="number"]::-webkit-inner-spin-button { -webkit-appearance: none; }
        input[type="number"] { width: 60px; -moz-appearance: textfield; }
        input[type="range"] { width: 90px; cursor: pointer; accent-color: var(--warning-color); }

        .mic-status-container { display: flex; align-items: center; background-color: rgba(255,255,255,0.1); padding: 6px 12px; border-radius: 30px; border: 1px solid rgba(255,255,255,0.2); }
        .btn-start-mic { background-color: #FF5252; color: white; border: none; padding: 10px 18px; border-radius: 30px; font-weight: 900; cursor: pointer; font-size: 1.1rem; font-family: inherit; box-shadow: 0 4px 10px rgba(211, 47, 47, 0.6); transition: all 0.1s; }
        .btn-start-mic:active { transform: translateY(3px); box-shadow: 0 0 0 #D32F2F; }

        .mic-active-ui { display: none; align-items: center; gap: 8px; font-size: 1rem; color: #FFF; font-weight: 900; }
        .mic-icon-green { width: 14px; height: 14px; background-color: #66BB6A; border-radius: 50%; box-shadow: 0 0 10px #66BB6A; }
        .volume-bar-container { width: 60px; height: 12px; background-color: rgba(255,255,255,0.2); border-radius: 6px; overflow: hidden; }
        .volume-bar-fill { height: 100%; width: 0%; background-color: #66BB6A; transition: width 0.05s ease-out; border-radius: 6px; }

        main {
            flex: 1;
            display: flex;
            flex-direction: row; 
            justify-content: center;
            align-items: center;
            position: relative;
            gap: 50px;
            padding: 20px;
        }

        .sequence-container {
            position: relative;
            width: 350px; 
            height: 320px;
            background-color: var(--panel-bg);
            border-radius: 40px;
            border: 2px solid var(--border-color);
            box-shadow: 0 15px 40px rgba(0,0,0,0.6), inset 0 0 20px rgba(77, 182, 172, 0.1);
            display: flex;
            justify-content: space-around;
            align-items: flex-end;
            padding: 20px 10px;
            box-sizing: border-box;
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
        }

        .grid-line { position: absolute; width: 90%; left: 5%; height: 2px; background-color: rgba(255, 255, 255, 0.15); border-radius: 2px; z-index: 0; }
        .note-dot-wrapper { position: relative; width: 75px; height: 100%; z-index: 1; display: flex; flex-direction: column; justify-content: flex-end; align-items: center; }
        
        .arrow-indicator { position: absolute; bottom: -70px; font-size: 2.5rem; opacity: 0; pointer-events: none; transition: opacity 0.3s; animation: bounce-up 1s infinite; z-index: 5; filter: drop-shadow(0 4px 4px rgba(0,0,0,0.5)); }
        .note-dot-wrapper.is-active .arrow-indicator { opacity: 1; }

        @keyframes bounce-up { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-12px); } }

        .note-dot {
            position: absolute;
            width: 75px;
            height: 75px;
            background: radial-gradient(circle at 30% 30%, #ECEFF1, #90A4AE);
            border: 4px solid #CFD8DC;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.5rem;
            font-weight: 900;
            color: #37474F;
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            transform: translateY(50%); 
            cursor: pointer; 
            box-shadow: inset -5px -5px 15px rgba(0,0,0,0.3), 0 5px 15px rgba(0,0,0,0.5);
        }

        .note-dot:active { transform: translateY(50%) scale(0.85); }
        
        .note-dot.active { 
            background: radial-gradient(circle at 30% 30%, #FFF9C4, #FBC02D);
            border-color: #F57F17; 
            color: #4E342E; 
            transform: translateY(50%) scale(1.15); 
            box-shadow: inset -5px -5px 15px rgba(0,0,0,0.2), 0 0 25px rgba(253, 216, 53, 0.8); 
        }
        
        .note-dot.done { 
            background: radial-gradient(circle at 30% 30%, #B2DFDB, #00897B);
            border-color: #00695C; 
            color: #FFF; 
            transform: translateY(50%) scale(1); 
            box-shadow: inset -5px -5px 15px rgba(0,0,0,0.3), 0 0 15px rgba(0, 137, 123, 0.6);
        }
        
        .note-dot.demo-playing { 
            background: radial-gradient(circle at 30% 30%, #B3E5FC, #039BE5) !important;
            border-color: #0277BD !important; 
            transform: translateY(50%) scale(1.15) !important; 
            color: #FFF !important; 
            box-shadow: inset -5px -5px 15px rgba(0,0,0,0.2), 0 0 25px rgba(3, 155, 229, 0.9) !important; 
        }

        .pitch-visualizer {
            position: relative;
            width: 80px;
            height: 320px;
            background-color: var(--panel-bg);
            border-radius: 40px;
            border: 2px solid var(--border-color);
            box-shadow: 0 15px 40px rgba(0,0,0,0.6);
            display: flex;
            justify-content: center;
            backdrop-filter: blur(8px); 
            -webkit-backdrop-filter: blur(8px);
        }

        .target-line {
            position: absolute;
            top: 50%;
            width: 110px; 
            height: 4px;
            background-color: #FFCDD2; 
            transform: translateY(-50%);
            border-radius: 2px;
            z-index: 2;
            box-shadow: 0 0 8px rgba(255, 205, 210, 0.8);
        }

        .user-pitch-cursor {
            position: absolute;
            bottom: var(--cursor-pos); 
            width: 55px;
            height: 55px;
            background-color: #ECEFF1;
            border-radius: 50%;
            transform: translateY(50%); 
            transition: bottom 0.1s linear, left 0.1s linear;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.5);
            opacity: 0.4; 
            z-index: 3;
            border: 4px solid #FFF;
            overflow: hidden; 
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .user-pitch-cursor::before {
            content: '';
            position: absolute;
            bottom: 0; left: 0; width: 100%;
            height: var(--charge); 
            background-color: var(--warning-color);
            transition: height 0.1s linear;
            z-index: 1;
        }

        .user-pitch-cursor::after {
            content: '🚀';
            position: absolute;
            font-size: 1.8rem;
            z-index: 2;
            transform: rotate(-45deg); 
        }

        .user-pitch-cursor.active { opacity: 1; }
        .user-pitch-cursor.perfect { 
            background-color: var(--warning-color); 
            box-shadow: 0 0 30px rgba(255, 202, 40, 1); 
            transform: translateY(50%) scale(1.2); 
            transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .intro-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(10, 20, 35, 0.85); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 90; opacity: 0; pointer-events: none; transition: opacity 0.3s; backdrop-filter: blur(5px); -webkit-backdrop-filter: blur(5px); }
        .intro-overlay.show { opacity: 1; pointer-events: all; }
        .intro-card { background-color: var(--panel-bg); padding: 35px 40px; border-radius: 30px; border: 2px solid var(--border-color); box-shadow: 0 20px 50px rgba(0,0,0,0.8); text-align: center; width: 80%; max-width: 480px; transform: scale(0.8); transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .intro-overlay.show .intro-card { transform: scale(1); }
        .intro-card h2 { font-size: 2.2rem; color: #FFF; margin-top: 0; margin-bottom: 15px; line-height: 1.4; text-shadow: 0 2px 5px rgba(0,0,0,0.5); }
        .intro-card p { font-size: 1.2rem; color: #CFD8DC; margin-bottom: 30px; line-height: 1.6; }
        .btn-start-game { background-color: #FF9800; color: white; padding: 15px 40px; font-size: 1.5rem; font-weight: 900; font-family: inherit; border: none; border-radius: 50px; cursor: pointer; box-shadow: 0 6px 15px rgba(230, 81, 0, 0.6); transition: all 0.1s; }
        .btn-start-game:active { transform: translateY(5px); box-shadow: 0 0 0 transparent; }

        .action-prompt { position: fixed; top: 120px; left: 50%; transform: translate(-50%, -20px); color: white; padding: 12px 30px; border-radius: 30px; font-size: 1.5rem; font-weight: 900; box-shadow: 0 10px 25px rgba(0,0,0,0.5); opacity: 0; pointer-events: none; z-index: 1000; transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); border: 2px solid rgba(255,255,255,0.4); }
        .action-prompt.show { opacity: 1; transform: translate(-50%, 0); }

        .success-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(10, 20, 35, 0.9); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 100; opacity: 0; pointer-events: none; transition: opacity 0.4s; backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);}
        .success-overlay.show { opacity: 1; pointer-events: all; }
        .success-overlay h1 { font-size: 4.5rem; color: #FFCA28; text-shadow: 0 0 30px rgba(255, 202, 40, 0.8); margin-bottom: 40px; transform: scale(0.5); transition: transform 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .success-overlay.show h1 { transform: scale(1) rotate(-5deg); }

        footer { padding: 15px; display: flex; justify-content: center; gap: 20px; z-index: 10; margin-bottom: 10px; }
        .btn-play { background-color: rgba(255, 255, 255, 0.15); color: #FFF; border: 2px solid rgba(255,255,255,0.4); padding: 12px 35px; font-size: 1.2rem; font-weight: 900; font-family: inherit; border-radius: 50px; cursor: pointer; transition: all 0.2s; backdrop-filter: blur(5px); }
        .btn-play:hover { background-color: rgba(255, 255, 255, 0.25); }
        .btn-play:active { transform: translateY(4px); }
        
        .btn-massive { background-color: #4DB6AC; box-shadow: 0 6px 15px rgba(0, 105, 92, 0.6); color: white; font-size: 2rem; padding: 20px 60px; font-family: inherit; font-weight: 900; border: none; border-radius: 50px; cursor: pointer; transition: all 0.1s; }
        .btn-massive:active { transform: translateY(6px); box-shadow: 0 0 0 transparent; }

        @media (max-width: 820px) {
            main { flex-direction: column; gap: 30px; }
            .sequence-container { width: 90%; height: 250px; margin-bottom: 30px; } 
            .pitch-visualizer { width: 90%; height: 60px; flex-direction: column; align-items: center; }
            .target-line { top: 0; left: 50%; width: 6px; height: 80px; transform: translateX(-50%); }
            .user-pitch-cursor { bottom: 0; left: var(--cursor-pos); transform: translateX(-50%); }
            .user-pitch-cursor.perfect { transform: translateX(-50%) scale(1.2); }
            .success-overlay h1 { font-size: 3rem; }
            .intro-card h2 { font-size: 1.6rem; }
            .intro-card p { font-size: 1rem; }
            .btn-start-game { font-size: 1.2rem; padding: 12px 30px; }
            .action-prompt { font-size: 1.2rem; padding: 10px 25px; top: 160px; } 
            header { padding: 10px; margin: 10px; }
        }
    </style>
</head>
<body>

    <header>
        <div class="header-group">
            <label>星系：</label>
            <select id="min-note"></select><span>-</span><select id="max-note"></select>
        </div>
        <div class="header-group">
            <label>救援數：</label>
            <select id="note-count">
                <option value="1">1 顆星球</option>
                <option value="2">2 顆星球</option>
                <option value="3" selected>3 顆星球</option>
            </select>
        </div>
        <div class="header-group">
            <label>A4=</label>
            <input type="number" id="a4-input" value="440">
        </div>
        <div class="header-group">
            <label>靈敏度：</label>
            <input type="range" id="sensitivity-slider" min="1" max="15" value="8" step="0.5">
        </div>
        
        <div class="mic-status-container">
            <button id="start-mic-btn" class="btn-start-mic">🎙️ 開啟雷達</button>
            <div id="mic-active-ui" class="mic-active-ui">
                <span class="mic-icon-green"></span>
                <span>收音中</span>
                <div class="volume-bar-container"><div class="volume-bar-fill" id="volume-level"></div></div>
            </div>
        </div>
    </header>

    <div id="action-prompt" class="action-prompt"></div>

    <main>
        <div class="sequence-container" id="sequence-display">
            <div class="grid-line" style="bottom: 25%"></div>
            <div class="grid-line" style="bottom: 50%"></div>
            <div class="grid-line" style="bottom: 75%"></div>
        </div>
        
        <div class="pitch-visualizer">
            <div class="target-line"></div>
            <div class="user-pitch-cursor" id="pitch-cursor"></div>
        </div>

        <div class="intro-overlay" id="intro-overlay">
            <div class="intro-card">
                <h2>🚀 呼叫太空救援隊！<br>前方發現 <span id="intro-count" style="color: #FFCA28; font-size: 2.8rem;">3</span> 顆失去能量的星球</h2>
                <p>請先接收總部的「示範音頻」定位，<br>接著跟著下方指示 (☝️)，<br>用平穩的歌聲為火箭注入燃料飛過去吧！</p>
                <button class="btn-start-game" id="btn-start-game">發送定位音頻 🎵</button>
            </div>
        </div>

        <div class="success-overlay" id="success-overlay">
            <h1>🛸 成功點亮星系！🎉</h1>
            <button class="btn-massive" id="next-seq-btn">飛向下一片星系 ➔</button>
        </div>
    </main>

    <footer>
        <button class="btn-play" id="play-btn">🎵 重新接收任務音頻</button>
    </footer>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const playBtn = document.getElementById('play-btn');
            const startMicBtn = document.getElementById('start-mic-btn');
            const micActiveUI = document.getElementById('mic-active-ui');
            const volumeLevel = document.getElementById('volume-level');
            const pitchCursor = document.getElementById('pitch-cursor');
            const sequenceDisplay = document.getElementById('sequence-display');
            const successOverlay = document.getElementById('success-overlay');
            const nextSeqBtn = document.getElementById('next-seq-btn');
            
            const introOverlay = document.getElementById('intro-overlay');
            const introCount = document.getElementById('intro-count');
            const btnStartGame = document.getElementById('btn-start-game');
            const actionPrompt = document.getElementById('action-prompt');
            
            const minNoteSelect = document.getElementById('min-note');
            const maxNoteSelect = document.getElementById('max-note');
            const noteCountSelect = document.getElementById('note-count');
            const a4Input = document.getElementById('a4-input');
            const sensitivitySlider = document.getElementById('sensitivity-slider');
            
            let audioContext;
            let analyser;
            let micGainNode; 
            
            let isDetecting = false;
            let isSequenceComplete = false;
            let isTransitioning = false; 
            let isListeningToUser = false; 
            let currentSequenceId = 0; 
            let playbackInterruptToken = 0; // 【新增】：防干擾令牌，確保麥克風在播放時絕對關閉
            
            let currentSequence = []; 
            let currentTargetIndex = 0; 
            let targetFreq = 261.63; 
            
            let matchFrames = 0; 
            const REQUIRED_FRAMES = 35; 
            const CENTS_TOLERANCE = 50; 
            let smoothedPosition = 50; 
            let previousFreq = 0; 
            let promptTimeout; 

            const cMajorPitches = [0, 2, 4, 5, 7, 9, 11];

            function midiToNoteName(midi) {
                const noteNames = ['Do', 'Do#', 'Re', 'Re#', 'Mi', 'Fa', 'Fa#', 'Sol', 'Sol#', 'La', 'La#', 'Si'];
                const octave = Math.floor(midi / 12) - 1; 
                const noteName = noteNames[midi % 12];
                if (octave === 3) return noteName; 
                if (octave === 4) return noteName + '1'; 
                if (octave === 5) return noteName + '2'; 
                if (octave === 6) return noteName + '3'; 
                return `${noteName}${octave}`; 
            }

            function populateNoteSelectors() {
                let optionsHtml = '';
                for (let i = 48; i <= 84; i++) {
                    if (cMajorPitches.includes(i % 12)) {
                        optionsHtml += `<option value="${i}">${midiToNoteName(i)}</option>`;
                    }
                }
                minNoteSelect.innerHTML = optionsHtml;
                maxNoteSelect.innerHTML = optionsHtml;
                minNoteSelect.value = "60"; 
                maxNoteSelect.value = "72"; 
            }

            function midiToFreq(midi) {
                const a4Freq = parseFloat(a4Input.value) || 440;
                return a4Freq * Math.pow(2, (midi - 69) / 12);
            }

            function initAudio() {
                if (!audioContext) {
                    const AudioContext = window.AudioContext || window.webkitAudioContext;
                    audioContext = new AudioContext();
                    analyser = audioContext.createAnalyser();
                    analyser.fftSize = 2048;
                }
            }

            function playXylophoneTone(freq, startTime, duration) {
                const osc = audioContext.createOscillator();
                const gainNode = audioContext.createGain();
                const clickOsc = audioContext.createOscillator();
                const clickGain = audioContext.createGain();
                
                osc.type = 'sine'; 
                osc.frequency.value = freq;
                
                clickOsc.type = 'triangle'; 
                clickOsc.frequency.value = freq * 2.5; 

                gainNode.gain.setValueAtTime(0, startTime);
                gainNode.gain.linearRampToValueAtTime(0.4, startTime + 0.02); 
                gainNode.gain.exponentialRampToValueAtTime(0.2, startTime + 0.2); 
                gainNode.gain.setValueAtTime(0.2, startTime + duration - 0.3); 
                gainNode.gain.exponentialRampToValueAtTime(0.001, startTime + duration); 
                
                clickGain.gain.setValueAtTime(0, startTime);
                clickGain.gain.linearRampToValueAtTime(0.3, startTime + 0.01);
                clickGain.gain.exponentialRampToValueAtTime(0.001, startTime + 0.05);

                osc.connect(gainNode);
                clickOsc.connect(clickGain);
                gainNode.connect(audioContext.destination);
                clickGain.connect(audioContext.destination);
                
                osc.start(startTime);
                osc.stop(startTime + duration);
                clickOsc.start(startTime);
                clickOsc.stop(startTime + 0.1); 
            }

            function showActionPrompt(msg, duration = 2500, bgColor = "rgba(255, 82, 82, 0.95)") {
                actionPrompt.textContent = msg;
                actionPrompt.style.backgroundColor = bgColor;
                actionPrompt.classList.add('show');
                
                clearTimeout(promptTimeout);
                if (duration > 0) {
                    promptTimeout = setTimeout(() => { 
                        actionPrompt.classList.remove('show'); 
                    }, duration);
                }
            }

            // 【核心修正】：發出聲音時產生新令牌，並強制關閉麥克風
            function playTargetNoteForGameplay(index) {
                let midi = currentSequence[index];
                if (!midi) return;
                let dot = document.getElementById(`dot-${index}`);
                if (dot) dot.classList.add('demo-playing');

                initAudio();
                if (audioContext.state === 'suspended') audioContext.resume();

                isListeningToUser = false; 
                playbackInterruptToken++; // 產生新令牌
                let currentToken = playbackInterruptToken;

                const now = audioContext.currentTime;
                playXylophoneTone(midiToFreq(midi), now, 3.0); 

                showActionPrompt("👂 總部發送定位中，請聆聽...", 3000, "rgba(3, 169, 244, 0.95)");

                let seqId = currentSequenceId;
                setTimeout(() => {
                    if (dot) dot.classList.remove('demo-playing');
                    // 只有當「沒有被新聲音打斷」時，才允許開啟麥克風
                    if (currentToken === playbackInterruptToken && seqId === currentSequenceId && currentTargetIndex === index && !isSequenceComplete) {
                        showActionPrompt("🚀 換你了！請持續哼唱注入燃料！", 3000, "rgba(255, 152, 0, 0.95)");
                        isListeningToUser = true;
                    }
                }, 3000);
            }

            function playFullSequence(isInitialPlay = false) {
                initAudio();
                if (audioContext.state === 'suspended') audioContext.resume();
                
                isListeningToUser = false; 
                playbackInterruptToken++; // 產生新令牌
                let currentToken = playbackInterruptToken;

                let startTime = audioContext.currentTime;
                const noteDuration = 1.0; 
                const gapDuration = 0.3;  
                
                currentSequence.forEach((midi, index) => {
                    let playTime = startTime + (index * (noteDuration + gapDuration));
                    playXylophoneTone(midiToFreq(midi), playTime, noteDuration);

                    setTimeout(() => {
                        if (currentToken !== playbackInterruptToken) return; // 如果被打斷，停止視覺動畫
                        let dots = document.querySelectorAll('.note-dot');
                        dots.forEach(d => d.classList.remove('demo-playing'));
                        if(dots[index]) dots[index].classList.add('demo-playing');
                    }, index * (noteDuration + gapDuration) * 1000);
                });

                let totalTime = currentSequence.length * (noteDuration + gapDuration) * 1000;
                
                let promptMsg = isInitialPlay ? "🎵 請先聽一次全區星系定位" : "🎵 重新接收全區定位音頻";
                showActionPrompt(promptMsg, totalTime, "rgba(156, 39, 176, 0.95)");
                
                setTimeout(() => {
                    if (currentToken !== playbackInterruptToken) return; // 被打斷就不執行後續
                    
                    let dots = document.querySelectorAll('.note-dot');
                    dots.forEach(d => d.classList.remove('demo-playing'));

                    if (isInitialPlay) {
                        currentTargetIndex = 0;
                        setTargetNote(0);
                        playTargetNoteForGameplay(0);
                    } else {
                        setTargetNote(currentTargetIndex);
                        if (!isSequenceComplete) isListeningToUser = true;
                    }
                }, totalTime);
            }

            function playSingleNote(midi) {
                initAudio();
                if (audioContext.state === 'suspended') audioContext.resume();
                
                isListeningToUser = false;
                playbackInterruptToken++; // 產生新令牌
                let currentToken = playbackInterruptToken;

                const now = audioContext.currentTime;
                playXylophoneTone(midiToFreq(midi), now, 3.0); 
                
                showActionPrompt("👂 總部發送定位中，請聆聽...", 3000, "rgba(3, 169, 244, 0.95)");

                setTimeout(() => { 
                    // 只有沒被其他聲音打斷，才把麥克風還給玩家
                    if (currentToken === playbackInterruptToken && !isSequenceComplete) {
                        isListeningToUser = true; 
                        showActionPrompt("🚀 換你了！繼續注入燃料", 2000, "rgba(255, 152, 0, 0.95)");
                    }
                }, 3000);
            }

            function generateSequence() {
                currentSequenceId++; 
                successOverlay.classList.remove('show');
                isSequenceComplete = false; 
                isTransitioning = false; 
                isListeningToUser = false; 
                
                const minMidi = parseInt(minNoteSelect.value);
                const maxMidi = parseInt(maxNoteSelect.value);
                const min = Math.min(minMidi, maxMidi);
                const max = Math.max(minMidi, maxMidi);
                const count = parseInt(noteCountSelect.value);

                let validNotes = [];
                for (let j = min; j <= max; j++) {
                    if (cMajorPitches.includes(j % 12)) validNotes.push(j);
                }

                currentSequence = [];
                const dots = sequenceDisplay.querySelectorAll('.note-dot-wrapper');
                dots.forEach(dot => dot.remove());

                for (let i = 0; i < count; i++) {
                    if (validNotes.length === 0) validNotes.push(60); 
                    
                    let randomIndex = Math.floor(Math.random() * validNotes.length);
                    let noteMidi = validNotes[randomIndex];
                    currentSequence.push(noteMidi);

                    let heightPercent = 50;
                    if (max > min) heightPercent = ((noteMidi - min) / (max - min)) * 100;

                    let wrapper = document.createElement('div');
                    wrapper.className = 'note-dot-wrapper';
                    wrapper.id = `wrapper-${i}`;
                    
                    let arrow = document.createElement('div');
                    arrow.className = 'arrow-indicator';
                    arrow.textContent = '☝️'; 
                    
                    let dot = document.createElement('div');
                    dot.className = 'note-dot';
                    dot.id = `dot-${i}`;
                    dot.style.bottom = `${heightPercent}%`;
                    dot.textContent = midiToNoteName(noteMidi);
                    
                    dot.addEventListener('click', () => { playSingleNote(noteMidi); });
                    
                    wrapper.appendChild(arrow);
                    wrapper.appendChild(dot);
                    sequenceDisplay.appendChild(wrapper);
                }
                currentTargetIndex = 0;
                introCount.textContent = count;
                introOverlay.classList.add('show');
            }

            function setTargetNote(index) {
                targetFreq = midiToFreq(currentSequence[index]);
                matchFrames = 0;
                previousFreq = 0;
                pitchCursor.style.setProperty('--charge', `0%`); 
                pitchCursor.classList.remove('perfect');
                
                for (let i = 0; i < currentSequence.length; i++) {
                    let dot = document.getElementById(`dot-${i}`);
                    let wrapper = document.getElementById(`wrapper-${i}`);
                    if(dot) dot.classList.remove('active');
                    if(wrapper) wrapper.classList.remove('is-active');
                    if (i < index && dot) dot.classList.add('done'); 
                }
                
                let targetDot = document.getElementById(`dot-${index}`);
                let targetWrapper = document.getElementById(`wrapper-${index}`);
                if (targetDot) targetDot.classList.add('active'); 
                if (targetWrapper) targetWrapper.classList.add('is-active');
            }

            populateNoteSelectors();
            generateSequence();

            minNoteSelect.addEventListener('change', generateSequence);
            maxNoteSelect.addEventListener('change', generateSequence);
            noteCountSelect.addEventListener('change', generateSequence);
            a4Input.addEventListener('change', () => { targetFreq = midiToFreq(currentSequence[currentTargetIndex]); });
            nextSeqBtn.addEventListener('click', generateSequence);
            
            sensitivitySlider.addEventListener('input', (e) => {
                if (micGainNode) micGainNode.gain.value = parseFloat(e.target.value);
            });

            btnStartGame.addEventListener('click', () => {
                introOverlay.classList.remove('show');
                playFullSequence(true); 
            });

            playBtn.addEventListener('click', () => { playFullSequence(false); });

            startMicBtn.addEventListener('click', async () => {
                try {
                    startMicBtn.textContent = '雷達連線中...';
                    initAudio();
                    const stream = await navigator.mediaDevices.getUserMedia({ 
                        audio: { echoCancellation: false, noiseSuppression: false } 
                    }); 
                    
                    startMicBtn.style.display = 'none';
                    micActiveUI.style.display = 'flex';
                    
                    let microphoneStream = audioContext.createMediaStreamSource(stream);
                    micGainNode = audioContext.createGain();
                    micGainNode.gain.value = parseFloat(sensitivitySlider.value); 
                    
                    microphoneStream.connect(micGainNode);
                    micGainNode.connect(analyser);
                    
                    isDetecting = true;
                    updatePitch(); 
                } catch (err) {
                    console.error("麥克風錯誤:", err);
                    alert('無法開啟麥克風。請確認瀏覽器已允許麥克風權限。');
                    startMicBtn.textContent = '🎙️ 開啟雷達'; 
                }
            });

            const buffer = new Float32Array(2048);

            function updatePitch() {
                requestAnimationFrame(updatePitch);

                // 【核心修正】：如果不是使用者的回合，強制清空視覺並返回，麥克風視同聾子！
                if (!isDetecting || isSequenceComplete || isTransitioning || !isListeningToUser) {
                    pitchCursor.classList.remove('active', 'perfect');
                    matchFrames = 0;
                    pitchCursor.style.setProperty('--charge', `0%`);
                    smoothedPosition = (smoothedPosition * 0.9) + (50 * 0.1);
                    pitchCursor.style.setProperty('--cursor-pos', `${smoothedPosition}%`);
                    return;
                }

                analyser.getFloatTimeDomainData(buffer);
                let rms = 0;
                for (let i = 0; i < buffer.length; i++) rms += buffer[i] * buffer[i];
                rms = Math.sqrt(rms / buffer.length);
                
                volumeLevel.style.width = Math.min(100, rms * 100 * 5) + '%';

                if (rms > 0.0015) { 
                    pitchCursor.classList.add('active');
                    let currentFreq = autoCorrelate(buffer, audioContext.sampleRate);
                    
                    if (currentFreq !== -1) {
                        let isPitchStable = true;
                        if (previousFreq > 0) {
                            let centsJump = Math.abs(1200 * Math.log2(currentFreq / previousFreq));
                            if (centsJump > 80) {
                                isPitchStable = false;
                            }
                        }
                        previousFreq = currentFreq;

                        let centsDiff = 1200 * Math.log2(currentFreq / targetFreq);
                        
                        let targetPosition = 50 + (centsDiff / 1.5); 
                        targetPosition = Math.max(5, Math.min(95, targetPosition));

                        smoothedPosition = (smoothedPosition * 0.85) + (targetPosition * 0.15);
                        pitchCursor.style.setProperty('--cursor-pos', `${smoothedPosition}%`);

                        let smoothedCentsDiff = (smoothedPosition - 50) * 1.5;

                        if (Math.abs(smoothedCentsDiff) < CENTS_TOLERANCE && isPitchStable) {
                            matchFrames++; 
                        } else {
                            if (!isPitchStable || Math.abs(smoothedCentsDiff) > 100) {
                                matchFrames = Math.max(0, matchFrames - 15); 
                            } else {
                                matchFrames = Math.max(0, matchFrames - 2);  
                            }
                        }

                        let chargePercent = Math.min(100, (matchFrames / REQUIRED_FRAMES) * 100);
                        pitchCursor.style.setProperty('--charge', `${chargePercent}%`);

                        if (matchFrames >= REQUIRED_FRAMES) {
                            pitchCursor.classList.add('perfect');
                            currentTargetIndex++;
                            
                            if (currentTargetIndex >= currentSequence.length) {
                                isSequenceComplete = true; 
                                document.getElementById(`dot-${currentTargetIndex-1}`).classList.add('done');
                                document.getElementById(`dot-${currentTargetIndex-1}`).classList.remove('active');
                                document.getElementById(`wrapper-${currentTargetIndex-1}`).classList.remove('is-active'); 
                                setTimeout(() => { successOverlay.classList.add('show'); }, 300); 
                            } else {
                                isTransitioning = true; 
                                isListeningToUser = false; 
                                setTimeout(() => {
                                    setTargetNote(currentTargetIndex);
                                    pitchCursor.classList.remove('perfect');
                                    isTransitioning = false; 
                                    playTargetNoteForGameplay(currentTargetIndex);
                                }, 500);
                            }
                        } else {
                            pitchCursor.classList.remove('perfect');
                        }
                    }
                } else {
                    previousFreq = 0; 
                    pitchCursor.classList.remove('active');
                    pitchCursor.classList.remove('perfect');
                    
                    matchFrames = Math.max(0, matchFrames - 8);
                    let chargePercent = Math.min(100, (matchFrames / REQUIRED_FRAMES) * 100);
                    pitchCursor.style.setProperty('--charge', `${chargePercent}%`);
                    
                    smoothedPosition = (smoothedPosition * 0.9) + (50 * 0.1);
                    pitchCursor.style.setProperty('--cursor-pos', `${smoothedPosition}%`);
                }
            }

            function autoCorrelate(buf, sampleRate) {
                let SIZE = buf.length;
                let r1 = 0, r2 = SIZE - 1, thres = 0.2;
                for (let i = 0; i < SIZE / 2; i++) if (Math.abs(buf[i]) < thres) { r1 = i; break; }
                for (let i = 1; i < SIZE / 2; i++) if (Math.abs(buf[SIZE - i]) < thres) { r2 = SIZE - i; break; }

                buf = buf.slice(r1, r2);
                SIZE = buf.length;
                let c = new Array(SIZE).fill(0);
                for (let i = 0; i < SIZE; i++) for (let j = 0; j < SIZE - i; j++) c[i] = c[i] + buf[j] * buf[j + i];
                
                let d = 0; while (c[d] > c[d + 1]) d++;
                let maxval = -1, maxpos = -1;
                for (let i = d; i < SIZE; i++) if (c[i] > maxval) { maxval = c[i]; maxpos = i; }
                
                let clarity = maxval / c[0];
                if (clarity < 0.5) { return -1; }

                let T0 = maxpos;
                if (maxpos > 0 && maxpos < SIZE - 1) {
                    let y1 = c[maxpos - 1], y2 = c[maxpos], y3 = c[maxpos + 1];
                    let a = (y1 + y3 - 2 * y2) / 2;
                    let b = (y3 - y1) / 2;
                    if (a !== 0) T0 = T0 - b / (2 * a);
                }

                return sampleRate / T0;
            }
        });
    </script>
